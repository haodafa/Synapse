name: Release

on:
  push:
    tags:
      - "v*"
      - "release-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release"
        required: true
        type: string

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          
          # Extract version from tag
          VERSION=${TAG#v}
          
          # Create release notes
          NOTES="## Synapse v${VERSION}\n\n"
          NOTES+="### Features\n"
          NOTES+="- See CHANGELOG for details\n\n"
          NOTES+="### Installation\n\n"
          NOTES+="\`\`\`bash\n"
          NOTES+="# CLI\n"
          NOTES+="npm install -g @synapse/cli\n\n"
          NOTES+="# Desktop\n"
          NOTES+="Download from GitHub Releases\n"
          NOTES+="\`\`\`\n\n"
          NOTES+="### NPM Packages\n"
          NOTES+="- @synapse/protocol\n"
          NOTES+="- @synapse/client\n"
          NOTES+="- @synapse/unified-daemon\n"
          NOTES+="- @synapse/cli\n"
          NOTES+="- @synapse/highlight\n"
          NOTES+="- @synapse/relay\n"
          
          # Create release
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "Synapse v${VERSION}" \
            --notes "$NOTES"

  publish-npm:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: |
          npm run build:unified

      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Publish public packages
          for pkg in highlight relay protocol client unified-daemon cli; do
            echo "Publishing @synapse/$pkg..."
            npm publish --workspace=@synapse/$pkg --access public || echo "Skipped @synapse/$pkg (may already exist)"
          done

  sync-release-notes:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            CHANGELOG.md
            scripts
          sparse-checkout-cone-mode: false

      - name: Sync release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          
          # Check if there's a CHANGELOG
          if [ -f "CHANGELOG.md" ]; then
            echo "CHANGELOG found, updating release notes..."
          fi
