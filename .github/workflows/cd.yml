name: CD Pipeline

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DEFAULT_TAG: latest

jobs:
  # ==========================================
  # Build & Push Docker Images
  # ==========================================
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      
      - name: Determine image tag
        id: image_tag
        run: |
          # Use version from metadata if available, otherwise fallback to git SHA
          if [ -n "${{ steps.meta.outputs.version }}" ]; then
            echo "tag=${{ steps.meta.outputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build and push Unified Daemon
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          target: unified-daemon
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/unified-daemon:${{ steps.image_tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/unified-daemon:${{ env.DEFAULT_TAG }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build and push Web UI
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          target: web
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web:${{ steps.image_tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web:${{ env.DEFAULT_TAG }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build and push CLI
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          target: cli
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/cli:${{ steps.image_tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/cli:${{ env.DEFAULT_TAG }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================
  # Create GitHub Release
  # ==========================================
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Create Release Notes
        id: release_notes
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          echo "## What's Changed" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          
          if [ -z "$PREVIOUS_TAG" ]; then
            git log --pretty=format:"- %s" | head -20 >> RELEASE_NOTES.md
          else
            git log --pretty=format:"- %s" $PREVIOUS_TAG..HEAD | head -20 >> RELEASE_NOTES.md
          fi
          
          echo "" >> RELEASE_NOTES.md
          
          if [ -z "$PREVIOUS_TAG" ]; then
            echo "**Initial Release**" >> RELEASE_NOTES.md
          else
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREVIOUS_TAG...$VERSION" >> RELEASE_NOTES.md
          fi
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          files: |
            README.md
            LICENSE
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================
  # Deploy to Kubernetes (Staging) - Optional
  # ==========================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: staging
      url: https://staging.synapse.example.com
    if: ${{ secrets.KUBE_CONFIG != '' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Determine deployment image tag
        id: deploy_tag
        run: |
          if [ -n "${{ github.ref_name }}" ]; then
            echo "image_tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "image_tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi
      
      - name: Configure Kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}
      
      - name: Deploy to Kubernetes
        run: |
          echo "Deploying with image tag: ${{ steps.deploy_tag.outputs.image_tag }}"
          
          IMAGE_TAG="${{ steps.deploy_tag.outputs.image_tag }}"
          REGISTRY="${{ env.REGISTRY }}"
          IMAGE_NAME="${{ env.IMAGE_NAME }}"
          
          echo "Current directory: $(pwd)"
          echo "Files in k8s directory:"
          ls -la k8s/
          
          echo "=== Before replacement ==="
          cat k8s/unified-daemon.yaml | grep -i image
          cat k8s/web.yaml | grep -i image
          
          # Use sed with proper escaping for Kubernetes manifests
          sed -i.bak "s|image:.*unified-daemon.*|image: $REGISTRY/$IMAGE_NAME/unified-daemon:$IMAGE_TAG|g" k8s/unified-daemon.yaml
          sed -i.bak "s|image:.*web.*|image: $REGISTRY/$IMAGE_NAME/web:$IMAGE_TAG|g" k8s/web.yaml
          
          echo "=== After replacement ==="
          cat k8s/unified-daemon.yaml | grep -i image
          cat k8s/web.yaml | grep -i image
          
          echo "Applying Kubernetes manifests..."
          kubectl apply -f k8s/namespace.yaml --record
          kubectl apply -f k8s/postgres.yaml --record
          kubectl apply -f k8s/redis.yaml --record
          kubectl apply -f k8s/unified-daemon.yaml --record
          kubectl apply -f k8s/web.yaml --record
          
          echo "Waiting for rollout..."
          kubectl rollout status deployment/unified-daemon -n synapse --timeout=5m || true
          kubectl rollout status deployment/web -n synapse --timeout=5m || true
          
          echo "Deployment completed successfully"

  # ==========================================
  # Deploy to Kubernetes (Production) - Optional
  # ==========================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      url: https://synapse.example.com
    if: ${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') && secrets.KUBE_CONFIG != '' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure Kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}
      
      - name: Deploy to Kubernetes
        run: |
          echo "Deploying to production with tag: ${{ github.ref_name }}"
          
          IMAGE_TAG="${{ github.ref_name }}"
          REGISTRY="${{ env.REGISTRY }}"
          IMAGE_NAME="${{ env.IMAGE_NAME }}"
          
          sed -i.bak "s|image:.*unified-daemon.*|image: $REGISTRY/$IMAGE_NAME/unified-daemon:$IMAGE_TAG|g" k8s/unified-daemon.yaml
          sed -i.bak "s|image:.*web.*|image: $REGISTRY/$IMAGE_NAME/web:$IMAGE_TAG|g" k8s/web.yaml
          
          kubectl apply -f k8s/namespace.yaml --record
          kubectl apply -f k8s/postgres.yaml --record
          kubectl apply -f k8s/redis.yaml --record
          kubectl apply -f k8s/unified-daemon.yaml --record
          kubectl apply -f k8s/web.yaml --record
          
          kubectl rollout status deployment/unified-daemon -n synapse --timeout=10m || true
          kubectl rollout status deployment/web -n synapse --timeout=10m || true
          
          echo "Production deployment completed successfully"
