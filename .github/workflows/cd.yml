name: CD Pipeline

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==========================================
  # Build & Push Docker Images
  # ==========================================
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build and push Unified Daemon
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          target: unified-daemon
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/unified-daemon:${{ steps.meta.outputs.version }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build and push Web UI
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          target: web
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web:${{ steps.meta.outputs.version }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build and push CLI
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          target: cli
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/cli:${{ steps.meta.outputs.version }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================
  # Deploy to Kubernetes (Staging)
  # ==========================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: staging
      url: https://staging.synapse.example.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure Kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}
      
      - name: Deploy to Kubernetes
        run: |
          # Replace image tags in k8s manifests
          IMAGE_TAG="${{ github.ref_name }}"
          sed -i "s|image: synapse/unified-daemon:latest|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/unified-daemon:${IMAGE_TAG}|g" k8s/unified-daemon.yaml
          sed -i "s|image: synapse/web:latest|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web:${IMAGE_TAG}|g" k8s/web.yaml
          
          # Apply manifests
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/secrets.yaml
          kubectl apply -f k8s/postgres.yaml
          kubectl apply -f k8s/redis.yaml
          kubectl apply -f k8s/unified-daemon.yaml
          kubectl apply -f k8s/web.yaml
          
          # Wait for rollout
          kubectl rollout status deployment/unified-daemon -n synapse --timeout=5m
          kubectl rollout status deployment/web -n synapse --timeout=5m

  # ==========================================
  # Deploy to Kubernetes (Production)
  # ==========================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      url: https://synapse.example.com
    
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure Kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}
      
      - name: Deploy to Kubernetes
        run: |
          # Replace image tags in k8s manifests
          IMAGE_TAG="${{ github.ref_name }}"
          sed -i "s|image: synapse/unified-daemon:latest|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/unified-daemon:${IMAGE_TAG}|g" k8s/unified-daemon.yaml
          sed -i "s|image: synapse/web:latest|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web:${IMAGE_TAG}|g" k8s/web.yaml
          
          # Apply manifests
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/secrets.yaml
          kubectl apply -f k8s/postgres.yaml
          kubectl apply -f k8s/redis.yaml
          kubectl apply -f k8s/unified-daemon.yaml
          kubectl apply -f k8s/web.yaml
          
          # Wait for rollout
          kubectl rollout status deployment/unified-daemon -n synapse --timeout=10m
          kubectl rollout status deployment/web -n synapse --timeout=10m
