name: CD Pipeline

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to use'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/synapse

jobs:
  # ==========================================
  # Build & Push Docker Images
  # ==========================================
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Determine image tag
        id: image_tag
        run: |
          if [ -n "${{ github.ref_name }}" ]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build and push Unified Daemon
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          target: unified-daemon
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/unified-daemon:${{ steps.image_tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/unified-daemon:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production
          continue-on-error: true
      
      - name: Build and push Web UI
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          target: web
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web:${{ steps.image_tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production
          continue-on-error: true
      
      - name: Build and push CLI
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          target: cli
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/cli:${{ steps.image_tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/cli:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production
          continue-on-error: true

  # ==========================================
  # Create GitHub Release
  # ==========================================
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Create Release Notes
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          echo "## What's Changed" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          
          if [ -z "$PREVIOUS_TAG" ]; then
            git log --pretty=format:"- %s" | head -20 >> RELEASE_NOTES.md || true
          else
            git log --pretty=format:"- %s" $PREVIOUS_TAG..HEAD | head -20 >> RELEASE_NOTES.md || true
          fi
          
          echo "" >> RELEASE_NOTES.md
          
          if [ -z "$PREVIOUS_TAG" ]; then
            echo "**Initial Release**" >> RELEASE_NOTES.md || true
          else
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREVIOUS_TAG...$VERSION" >> RELEASE_NOTES.md || true
          fi
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            README.md
            LICENSE
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================
  # Deploy to Kubernetes (Optional)
  # ==========================================
  deploy-kubernetes:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: production
    if: ${{ secrets.KUBE_CONFIG != '' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Determine deployment image tag
        id: deploy_tag
        run: |
          if [ -n "${{ github.ref_name }}" ]; then
            echo "image_tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "image_tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi
      
      - name: Configure Kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}
      
      - name: Deploy to Kubernetes
        run: |
          set -e
          
          IMAGE_TAG="${{ steps.deploy_tag.outputs.image_tag }}"
          REGISTRY="${{ env.REGISTRY }}"
          IMAGE_NAME="${{ env.IMAGE_NAME }}"
          
          echo "Deploying with image tag: $IMAGE_TAG"
          echo "Registry: $REGISTRY"
          echo "Image name: $IMAGE_NAME"
          
          # Update image references in k8s manifests
          for file in k8s/*.yaml; do
            if [ -f "$file" ]; then
              echo "Processing $file"
              # Replace image references
              sed -i "s|image: .*/.*/unified-daemon:.*|image: $REGISTRY/$IMAGE_NAME/unified-daemon:$IMAGE_TAG|g" "$file" || true
              sed -i "s|image: .*/.*/web:.*|image: $REGISTRY/$IMAGE_NAME/web:$IMAGE_TAG|g" "$file" || true
            fi
          done
          
          echo "Applying Kubernetes manifests..."
          kubectl apply -f k8s/namespace.yaml --record || true
          kubectl apply -f k8s/postgres.yaml --record || true
          kubectl apply -f k8s/redis.yaml --record || true
          kubectl apply -f k8s/unified-daemon.yaml --record || true
          kubectl apply -f k8s/web.yaml --record || true
          
          echo "Waiting for rollout..."
          kubectl rollout status deployment/unified-daemon -n synapse --timeout=5m || echo "Rollout status check completed"
          kubectl rollout status deployment/web -n synapse --timeout=5m || echo "Rollout status check completed"
          
          echo "Deployment completed"
