name: CD Pipeline

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==========================================
  # Build & Push Docker Images
  # ==========================================
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build and push Unified Daemon
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          target: unified-daemon
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/unified-daemon:${{ steps.meta.outputs.version }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build and push Web UI
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          target: web
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web:${{ steps.meta.outputs.version }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build and push CLI
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          target: cli
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/cli:${{ steps.meta.outputs.version }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================
  # Create GitHub Release
  # ==========================================
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Create Release Notes
        id: release_notes
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          # Generate release notes from git log
          echo "## What's Changed" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          
          # Try to find previous tag
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          
          if [ -z "$PREVIOUS_TAG" ]; then
            # If no previous tag, show all commits
            git log --pretty=format:"- %s" >> RELEASE_NOTES.md
          else
            git log --pretty=format:"- %s" $PREVIOUS_TAG..HEAD >> RELEASE_NOTES.md
          fi
          
          echo "" >> RELEASE_NOTES.md
          
          if [ -z "$PREVIOUS_TAG" ]; then
            echo "**Initial Release**" >> RELEASE_NOTES.md
          else
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREVIOUS_TAG...$VERSION" >> RELEASE_NOTES.md
          fi
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          files: |
            README.md
            LICENSE
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================
  # Deploy to Kubernetes (Staging) - Optional
  # ==========================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: create-release
    environment:
      name: staging
      url: https://staging.synapse.example.com
    if: ${{ secrets.KUBE_CONFIG != '' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure Kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}
      
      - name: Deploy to Kubernetes
        run: |
          # Replace image tags in k8s manifests
          IMAGE_TAG="${{ github.ref_name }}"
          sed -i "s|image: synapse/unified-daemon:latest|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/unified-daemon:${IMAGE_TAG}|g" k8s/unified-daemon.yaml
          sed -i "s|image: synapse/web:latest|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web:${IMAGE_TAG}|g" k8s/web.yaml
          
          # Apply manifests
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/postgres.yaml
          kubectl apply -f k8s/redis.yaml
          kubectl apply -f k8s/unified-daemon.yaml
          kubectl apply -f k8s/web.yaml
          
          # Wait for rollout
          kubectl rollout status deployment/unified-daemon -n synapse --timeout=5m || true
          kubectl rollout status deployment/web -n synapse --timeout=5m || true

  # ==========================================
  # Deploy to Kubernetes (Production) - Optional
  # ==========================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      url: https://synapse.example.com
    if: ${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') && secrets.KUBE_CONFIG != '' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure Kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}
      
      - name: Deploy to Kubernetes
        run: |
          # Replace image tags in k8s manifests
          IMAGE_TAG="${{ github.ref_name }}"
          sed -i "s|image: synapse/unified-daemon:latest|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/unified-daemon:${IMAGE_TAG}|g" k8s/unified-daemon.yaml
          sed -i "s|image: synapse/web:latest|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web:${IMAGE_TAG}|g" k8s/web.yaml
          
          # Apply manifests
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/postgres.yaml
          kubectl apply -f k8s/redis.yaml
          kubectl apply -f k8s/unified-daemon.yaml
          kubectl apply -f k8s/web.yaml
          
          # Wait for rollout
          kubectl rollout status deployment/unified-daemon -n synapse --timeout=10m || true
          kubectl rollout status deployment/web -n synapse --timeout=10m || true
