npmRebuild: false
appId: sh.synapse.desktop
productName: Synapse
executableName: Synapse
afterPack: ./scripts/after-pack.js
afterSign: ./scripts/after-sign.js
directories:
  output: release
files:
  - dist/**/*
  - "!**/*.map"
  - "!node_modules/@synapse/*/src/**"
  - "!node_modules/@synapse/**/*.test.*"
  - "!node_modules/@synapse/**/*.spec.*"
asarUnpack:
  - dist/daemon/node-entrypoint-runner.js
  - node_modules/@synapse/unified-daemon/dist/server/terminal/shell-integration/**/*
extraResources:
  - from: ../app/dist
    to: app-dist
  - from: ../../skills
    to: skills
publish:
  provider: github
  owner: haodafa
  repo: Synapse
mac:
  artifactName: "Synapse-${version}-${arch}.${ext}"
  category: public.app-category.developer-tools
  icon: assets/icon.icns
  hardenedRuntime: true
  notarize: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  extraResources:
    - from: bin/paseo
      to: bin/synapse
  target:
    - dmg
    - zip
linux:
  category: Development
  icon: assets
  artifactName: "Synapse-${version}-${arch}.${ext}"
  maintainer: "Synapse Team"
  vendor: "Synapse"
  extraResources:
    - from: bin/paseo
      to: bin/synapse
  target:
    - AppImage
    - deb
    - rpm
    - tar.gz
win:
  artifactName: "Synapse-Setup-${version}-${arch}.${ext}"
  icon: assets/icon.ico
  extraResources:
    - from: bin/paseo.cmd
      to: bin/synapse.cmd
  target:
    - target: nsis
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
