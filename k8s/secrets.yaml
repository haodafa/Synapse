# ==========================================
# Synapse Secrets (example)
#
# Note: In production, don't store secrets in Git!
# Use sealed-secrets, external-secrets, or vault.
# ==========================================
apiVersion: v1
kind: Secret
metadata:
  name: synapse-secrets
  namespace: synapse
type: Opaque
stringData:
  # Database credentials
  postgres-user: "synapse"
  postgres-password: "change_this_secure_password_in_production"
  
  # Redis credentials
  redis-password: "change_this_redis_password_in_production"
  
  # Connection URLs
  database-url: "postgresql://synapse:change_this_secure_password_in_production@postgres:5432/synapse"
  redis-url: "redis://:change_this_redis_password_in_production@redis:6379"
  
  # JWT and encryption secrets
  jwt-secret: "change_this_jwt_secret_in_production_use_a_long_random_string"
  encryption-key: "change_this_encryption_key_in_production"
  
  # API keys for external services
  openai-api-key: "your_openai_api_key_here"
  anthropic-api-key: "your_anthropic_api_key_here"
