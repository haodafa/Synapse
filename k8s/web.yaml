# ==========================================
# Web UI Deployment
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: synapse
  labels:
    app: web
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
        component: frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: web
          image: synapse/web:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: NODE_ENV
              value: "production"
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.synapse.example.com"
            - name: API_URL
              value: "http://unified-daemon:8080"
            - name: PORT
              value: "3000"
          ports:
            - containerPort: 3000
              name: http
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
      volumes:
        - name: tmp
          emptyDir: {}

---
# ==========================================
# Web UI Service
# ==========================================
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: synapse
  labels:
    app: web
    component: frontend
spec:
  selector:
    app: web
  ports:
    - port: 3000
      targetPort: http
      name: http
  type: ClusterIP

---
# ==========================================
# Ingress (for external access)
# ==========================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: synapse-ingress
  namespace: synapse
  labels:
    app: synapse
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  tls:
    - hosts:
        - synapse.example.com
        - api.synapse.example.com
      secretName: synapse-tls
  rules:
    - host: synapse.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 3000
    - host: api.synapse.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: unified-daemon
                port:
                  number: 8080
