# ==========================================
# Unified Daemon Deployment
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unified-daemon
  namespace: synapse
  labels:
    app: unified-daemon
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: unified-daemon
  template:
    metadata:
      labels:
        app: unified-daemon
        component: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: unified-daemon
          image: synapse/unified-daemon:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "8080"
            - name: HOST
              value: "0.0.0.0"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: synapse-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: synapse-secrets
                  key: redis-url
            - name: LOG_LEVEL
              value: "info"
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
      volumes:
        - name: tmp
          emptyDir: {}

---
# ==========================================
# Unified Daemon Service
# ==========================================
apiVersion: v1
kind: Service
metadata:
  name: unified-daemon
  namespace: synapse
  labels:
    app: unified-daemon
    component: backend
spec:
  selector:
    app: unified-daemon
  ports:
    - port: 8080
      targetPort: http
      name: http
  type: ClusterIP

---
# ==========================================
# Unified Daemon Horizontal Pod Autoscaler
# ==========================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: unified-daemon-hpa
  namespace: synapse
  labels:
    app: unified-daemon
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: unified-daemon
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
